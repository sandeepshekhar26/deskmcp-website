server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /404 {
        internal;
    }

    location ~* \.(?:jpg|jpeg|gif|png|svg|ico|webp|gif|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
