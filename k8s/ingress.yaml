apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deskmcp-website-ingress
  namespace: kriya-website
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "10"
spec:
  ingressClassName: traefik
  rules:
    - host: deskmcp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deskmcp-website
                port:
                  number: 80
    - host: www.deskmcp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deskmcp-website
                port:
                  number: 80
