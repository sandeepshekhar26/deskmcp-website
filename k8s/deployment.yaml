apiVersion: apps/v1
kind: Deployment
metadata:
  name: deskmcp-website
  namespace: kriya-website
  labels:
    app: deskmcp-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deskmcp-website
  template:
    metadata:
      labels:
        app: deskmcp-website
    spec:
      containers:
        - name: deskmcp-website
          image: localhost:5001/deskmcp-website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: deskmcp-website
  namespace: kriya-website
spec:
  selector:
    app: deskmcp-website
  ports:
    - port: 80
      targetPort: 80
